<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Horde.IO – Horde of Kings</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%232f5d2a'/%3E%3Ctext x='8' y='12' font-size='11' text-anchor='middle' fill='%23c9a227'%3EH%3C/text%3E%3C/svg%3E" />

    <!-- Webfonts: Cinzel (Display) + Inter (UI). Fällt offline sauber auf Serif/System zurück. -->

    <!-- Kritische Basis-Styles inline (verhindert Flash, bevor das gebündelte CSS lädt). -->

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0a07; }
      #game { position: fixed; inset: 0; }
      canvas { display: block; }
    </style>
  </head>

    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
